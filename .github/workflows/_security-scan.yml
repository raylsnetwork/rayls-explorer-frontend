# =============================================================================
# Reusable Workflow: Trivy Image Security Scan
# =============================================================================
# Scans a Docker image for vulnerabilities using Trivy.
#
# Security gate: the caller is responsible for acting on the `has_critical`
# output — typically pausing for admin approval (security-override environment)
# rather than hard-failing, to allow an explicit override with audit trail.
#
# Results are also uploaded to the GitHub Security tab (SARIF format).
#
# Usage:
#   jobs:
#     scan:
#       uses: raylsnetwork/rayls-public-github-workflows/.github/workflows/_security-scan.yml@main
#       with:
#         image_ref: registry.digitalocean.com/my-registry/my-image:tag
#       secrets: inherit
#
# Outputs:
#   has_critical: 'true' | 'false'
# =============================================================================

name: Trivy Image Scan

on:
  workflow_call:
    inputs:
      image_ref:
        description: "Full image reference to scan (e.g. registry/image:tag)"
        required: true
        type: string
    outputs:
      has_critical:
        description: "'true' if CRITICAL vulnerabilities were found in the image"
        value: ${{ jobs.scan.outputs.has_critical }}
    secrets:
      DO_REGISTRY_USERNAME:
        required: true
      DO_REGISTRY_TOKEN:
        required: true

jobs:
  scan:
    name: 🔒 Trivy Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      has_critical: ${{ steps.counts.outputs.has_critical }}

    steps:
      - name: Checkout (required for SARIF upload)
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_USERNAME }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      # -----------------------------------------------------------------------
      # 1. SARIF scan → GitHub Security tab
      # -----------------------------------------------------------------------
      - name: Trivy — SARIF (Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_ref }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

      # -----------------------------------------------------------------------
      # 2. Full table scan → stored to file for the summary
      # -----------------------------------------------------------------------
      - name: Trivy — Full report (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_ref }}
          format: "table"
          output: "trivy-report.txt"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      # -----------------------------------------------------------------------
      # 3. Count vulnerabilities and set output for the caller
      # -----------------------------------------------------------------------
      - name: Count vulnerabilities
        id: counts
        if: always()
        run: |
          CRITICAL_COUNT=$(grep -c "CRITICAL" trivy-report.txt 2>/dev/null || echo "0")
          HIGH_COUNT=$(grep -c "HIGH" trivy-report.txt 2>/dev/null || echo "0")
          MEDIUM_COUNT=$(grep -c "MEDIUM" trivy-report.txt 2>/dev/null || echo "0")
          echo "critical=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM_COUNT" >> $GITHUB_OUTPUT
          if [[ "$CRITICAL_COUNT" -gt 0 ]]; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # 4. Summary — always runs, values are never exposed
      # -----------------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          CRITICAL_COUNT="${{ steps.counts.outputs.critical }}"
          HIGH_COUNT="${{ steps.counts.outputs.high }}"
          MEDIUM_COUNT="${{ steps.counts.outputs.medium }}"
          TOTAL=$((CRITICAL_COUNT + HIGH_COUNT + MEDIUM_COUNT))

          {
            if [[ "$CRITICAL_COUNT" -gt 0 ]]; then
              echo "## ⚠️ Critical Vulnerabilities Found"
              echo ""
              echo "> The deploy pipeline is **paused** and requires explicit admin approval to proceed."
              echo "> Go to the release workflow run → **security-override** job to approve or reject."
            else
              echo "## ✅ Security Scan Passed"
            fi
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Image | \`${{ inputs.image_ref }}\` |"
            echo "| Scanner | Trivy |"
            echo "| Critical found | $([[ "$CRITICAL_COUNT" -gt 0 ]] && echo '⚠️ Yes' || echo '✅ No') |"
            echo ""
            echo "### Vulnerability Counts"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| 🔴 CRITICAL | **$CRITICAL_COUNT** |"
            echo "| 🟠 HIGH | $HIGH_COUNT |"
            echo "| 🟡 MEDIUM | $MEDIUM_COUNT |"
            echo "| **Total** | **$TOTAL** |"
            echo ""
            if [[ -s trivy-report.txt ]]; then
              echo "### Full Vulnerability Report"
              echo ""
              echo '```'
              cat trivy-report.txt
              echo '```'
            else
              echo "_No vulnerabilities found at CRITICAL / HIGH / MEDIUM severity._"
            fi
            echo ""
            echo "📋 Full details also available in the **Security** tab → Code scanning alerts."
          } >> $GITHUB_STEP_SUMMARY
