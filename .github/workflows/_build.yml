# =============================================================================
# Reusable Workflow: Build Docker Image
# =============================================================================
# Builds and optionally pushes a Docker image to the DigitalOcean Registry.
#
# The job runs with `environment: <inputs.environment>`, which gives it access
# to environment-level variables in the CALLING repo (e.g. VITE_BASE_API_URL,
# VITE_REVENUE_JSON_URL). Apps that don't use these vars receive empty strings,
# which are safely ignored via Docker build ARGs.
#
# Usage:
#   jobs:
#     build:
#       uses: ./.github/workflows/_build.yml
#       with:
#         image_name: my-app
#         environment: dev
#         push: true          # optional, defaults to true
#       secrets: inherit
#
# Outputs:
#   image_tag:    Primary image tag (short git SHA, e.g. abc1234) — same tag
#                 is used across environments so testnet and mainnet can pin
#                 the exact same image.
#   image_digest: Image digest for verification
#
# Required org-level secrets (passed via secrets: inherit):
#   DO_REGISTRY_USERNAME
#   DO_REGISTRY_TOKEN
#
# Optional environment-level variables (set in the calling repo's environments):
#   VITE_BASE_API_URL
#   VITE_REVENUE_JSON_URL
# =============================================================================

name: Build Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name (e.g. rls-transparency-portal)"
        required: true
        type: string
      environment:
        description: "Target environment (dev | prod)"
        required: true
        type: string
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: true
    outputs:
      image_tag:
        description: "The primary image tag"
        value: ${{ jobs.build.outputs.image_tag }}
      image_digest:
        description: "The image digest"
        value: ${{ jobs.build.outputs.image_digest }}
    secrets:
      DO_REGISTRY_USERNAME:
        required: true
      DO_REGISTRY_TOKEN:
        required: true

env:
  REGISTRY: registry.digitalocean.com/rayls-public-chain-registry

jobs:
  build:
    name: 🐳 Build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_USERNAME }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          tags: |
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.environment }}
          cache-to: type=gha,mode=max,scope=${{ inputs.environment }}
          build-args: |
            VITE_BASE_API_URL=${{ vars.VITE_BASE_API_URL }}
            VITE_REVENUE_JSON_URL=${{ vars.VITE_REVENUE_JSON_URL }}

      - name: Summary
        run: |
          echo "## 🐳 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ inputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | \`${{ inputs.push }}\` |" >> $GITHUB_STEP_SUMMARY
