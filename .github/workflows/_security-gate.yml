# =============================================================================
# Reusable Workflow: Security Gate
# =============================================================================
# Enforces a security gate after a Trivy image scan.
#
# - No CRITICAL vulns          → passes automatically → deploy proceeds
# - CRITICAL vulns + override  → logs warning and proceeds (actor is recorded)
# - CRITICAL vulns, no override → fails → deploy is blocked
#
# When blocked, an admin must re-trigger the calling workflow manually with
# skip_security_gate: true. The audit trail is preserved in GitHub's workflow
# run history (actor, timestamp, inputs).
#
# Usage:
#   jobs:
#     gate:
#       uses: raylsnetwork/rayls-public-github-workflows/.github/workflows/_security-gate.yml@main
#       with:
#         has_critical: ${{ needs.scan.outputs.has_critical }}
#         override: ${{ inputs.skip_security_gate || false }}
#
#   update-helm:
#     needs: [gate]
#     if: needs.gate.result == 'success'
#     ...
# =============================================================================

name: Security Gate

on:
  workflow_call:
    inputs:
      has_critical:
        description: "'true' if CRITICAL vulnerabilities were found (from _scan.yml output)"
        required: true
        type: string
      override:
        description: "Skip the gate even if CRITICAL vulns are present (must be explicitly set by an admin)"
        required: false
        default: false
        type: boolean

jobs:
  gate:
    name: 🛡️ Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify admin permission
        if: inputs.override == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.role_name' 2>/dev/null || echo "none")
          if [[ "$PERMISSION" != "admin" ]]; then
            echo "❌ Only repository admins can override the security gate."
            echo "Actor '${{ github.actor }}' has permission level: $PERMISSION"
            exit 1
          fi
          echo "✅ Admin permission verified for ${{ github.actor }} (role: $PERMISSION)"

      - name: Evaluate
        run: |
          if [[ "${{ inputs.has_critical }}" == "true" ]]; then
            if [[ "${{ inputs.override }}" == "true" ]]; then
              echo "╔══════════════════════════════════════════════════════════════════╗"
              echo "║            ⚠️  SECURITY OVERRIDE — DEPLOY UNBLOCKED  ⚠️          ║"
              echo "╠══════════════════════════════════════════════════════════════════╣"
              echo "║  CRITICAL vulnerabilities are present in the image.             ║"
              echo "║  An admin has explicitly overridden the security gate.          ║"
              echo "║  Override actor : ${{ github.actor }}"
              echo "║  Audit trail    : GitHub Actions → workflow run history         ║"
              echo "╚══════════════════════════════════════════════════════════════════╝"
            else
              echo "╔══════════════════════════════════════════════════════════════════╗"
              echo "║               ❌  SECURITY GATE — DEPLOY BLOCKED  ❌             ║"
              echo "╠══════════════════════════════════════════════════════════════════╣"
              echo "║  CRITICAL vulnerabilities were found in the image.              ║"
              echo "║  To unblock: re-trigger this workflow manually with             ║"
              echo "║  'skip_security_gate: true'.                                    ║"
              echo "╚══════════════════════════════════════════════════════════════════╝"
              exit 1
            fi
          else
            echo "✅ No CRITICAL vulnerabilities found. Proceeding with deploy."
          fi
