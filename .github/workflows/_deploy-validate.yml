# =============================================================================
# Reusable Workflow: Deploy Validation
# =============================================================================
# Validates and prepares a deployment:
#   1. Resolves the image tag ({env}-latest if not specified)
#   2. For production: pauses for admin approval (auditable via GitHub Deployments)
#   3. Verifies the image exists in the DigitalOcean Registry
#
# Production approval is recorded in GitHub → Deployments → prod-deploy with:
#   - Approver username
#   - Timestamp
#   - Optional free-text comment
#
# The calling repo must have a `prod-deploy` environment configured with
# required reviewers (repo admins). Use setup-repo.yml to create it.
#
# Usage:
#   jobs:
#     validate:
#       uses: ./.github/workflows/_deploy-validate.yml
#       with:
#         environment: prod
#         app_name: my-app
#         image_tag: ""        # optional, defaults to {env}-latest
#       secrets: inherit
#
# Outputs:
#   image_tag: Resolved image tag (e.g. dev-abc1234 or prod-latest)
#
# Required org-level secrets (passed via secrets: inherit):
#   DO_REGISTRY_USERNAME
#   DO_REGISTRY_TOKEN
# =============================================================================

name: Deploy Validation

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        required: true
        type: string
      app_name:
        description: "Application name (used to build the full image reference)"
        required: true
        type: string
      image_tag:
        description: "Image tag from registry (empty = {env}-latest)"
        required: false
        type: string
        default: ""
    outputs:
      image_tag:
        description: "Resolved image tag"
        value: ${{ jobs.pre-check.outputs.image_tag }}
    secrets:
      DO_REGISTRY_USERNAME:
        required: true
      DO_REGISTRY_TOKEN:
        required: true

env:
  REGISTRY: registry.digitalocean.com/rayls-public-chain-registry

jobs:
  # ---------------------------------------------------------------------------
  # 1. Resolve tag and display deployment info
  # ---------------------------------------------------------------------------
  pre-check:
    name: 🔍 Pre-check
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "value=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.environment }}-latest" >> $GITHUB_OUTPUT
          fi

      - name: Deployment info
        run: |
          echo "╔═══════════════════════════════════════════════════════════════╗"
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            echo "║           !!!  PRODUCTION DEPLOYMENT REQUESTED  !!!           ║"
          else
            echo "║              Development Deployment Requested                 ║"
          fi
          echo "╠═══════════════════════════════════════════════════════════════╣"
          echo "║  App:         ${{ inputs.app_name }}"
          echo "║  Environment: ${{ inputs.environment }}"
          echo "║  Tag:         ${{ steps.tag.outputs.value }}"
          echo "╚═══════════════════════════════════════════════════════════════╝"

  # ---------------------------------------------------------------------------
  # 2. Admin approval gate — production only
  #
  # `environment: prod-deploy` refers to the CALLING repo's environment.
  # Approval is permanently recorded in GitHub Deployments.
  #
  # Setup (one-time per repo): create `prod-deploy` environment in
  # GitHub → Settings → Environments with required reviewers = repo admins.
  # Use setup-repo.yml to automate this.
  # ---------------------------------------------------------------------------
  prod-approval:
    name: 🔐 Production Approval
    runs-on: ubuntu-latest
    needs: [pre-check]
    if: needs.pre-check.result == 'success' && inputs.environment == 'prod'
    environment: prod-deploy
    steps:
      - name: Approval granted
        run: |
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║            ✅  PRODUCTION DEPLOYMENT — ADMIN APPROVED  ✅        ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  App: ${{ inputs.app_name }}"
          echo "║  Tag: ${{ needs.pre-check.outputs.image_tag }}"
          echo "║  Approval recorded in: Deployments → prod-deploy                ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"

  # ---------------------------------------------------------------------------
  # 3. Verify image exists in registry
  # Runs after prod-approval (if prod) or directly after pre-check (if dev)
  # ---------------------------------------------------------------------------
  registry-check:
    name: ✅ Registry Check
    runs-on: ubuntu-latest
    needs: [pre-check, prod-approval]
    if: >-
      always() &&
      needs.pre-check.result == 'success' &&
      (needs.prod-approval.result == 'success' || needs.prod-approval.result == 'skipped')
    steps:
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_USERNAME }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Verify image exists
        run: |
          TAG="${{ needs.pre-check.outputs.image_tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ inputs.app_name }}:${TAG}"

          echo "🔍 Checking registry for: $IMAGE"
          echo ""

          if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "✅ Image tag '$TAG' found in registry"
          else
            echo "❌ Image tag '$TAG' NOT FOUND in registry"
            echo ""
            echo "💡 Tip: Run the release workflow first to build and push the image."
            exit 1
          fi

      - name: Summary
        run: |
          {
            echo "## ✅ Validation Passed"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| App | \`${{ inputs.app_name }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Image Tag | \`${{ needs.pre-check.outputs.image_tag }}\` |"
            echo "| Registry | DigitalOcean ✅ |"
            if [[ "${{ inputs.environment }}" == "prod" ]]; then
              echo ""
              echo "🔐 **Production deployment approved** — recorded in GitHub Deployments → \`prod-deploy\`."
            fi
          } >> $GITHUB_STEP_SUMMARY
